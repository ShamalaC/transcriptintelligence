name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write   # required for OIDC → AWS role assumption
  contents: read

env:
  AWS_REGION:       us-east-1
  AWS_ACCOUNT_ID:   ${{ secrets.AWS_ACCOUNT_ID }}
  PYTHON_VERSION:   "3.12"

jobs:
  # ── Job 1: lint + unit tests + cdk synth ────────────────────────────────────
  test:
    name: Lint · Test · Synth
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: |
          ruff check \
            transcript_intelligence/ \
            lambda/shared/python/ \
            lambda/ingestion_pii/ \
            lambda/orchestrator/ \
            lambda/agent_actions/ \
            lambda/chatbot/ \
            lambda/qs_embed/ \
            lambda/s3_trigger/

      - name: Unit tests
        run: |
          pytest tests/unit/ -v --tb=short
        env:
          PYTHONPATH: lambda/shared/python

      - name: Install Node.js (CDK CLI dependency)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: CDK synth (template validation)
        run: cdk synth --quiet
        # synth runs against the real account/region in app.py but doesn't
        # make any API calls — purely validates the CloudFormation template.

  # ── Job 2: deploy (main branch only) ────────────────────────────────────────
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/GitHubActionsDeployRole
          aws-region: ${{ env.AWS_REGION }}
          # No long-lived keys — GitHub's OIDC token is exchanged for a
          # short-lived session via STS AssumeRoleWithWebIdentity.

      - name: Install Node.js (CDK CLI dependency)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Build Anthropic Lambda Layer
        run: bash scripts/build_layer.sh

      - name: CDK deploy
        run: cdk deploy --require-approval never --outputs-file cdk-outputs.json

      - name: Upload CDK outputs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: cdk-outputs
          path: cdk-outputs.json
          retention-days: 30
